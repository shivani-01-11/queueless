<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>All Users</title>
</head>
<body>
<div th:replace=
             "~{fragments/navbar :: navbar}">
</div>
<h1>Registered Users</h1>

<table border="1">

  <tr>
    <th>ID</th>
    <th>Name</th>
    <th>Email</th>
  </tr>

  <tr th:each="user : ${users}">

    <td th:text="${user.id}"></td>

    <td th:text="${user.name}"></td>

    <td th:text="${user.email}"></td>

  </tr>

</table>

</body>
</html>
